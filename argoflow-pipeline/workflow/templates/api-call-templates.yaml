apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: api-call-templates
spec:
  templates:
    - name: call-iot-api
      container:
        image: curlimages/curl:latest
        env:
          - name: IOT_API_URL
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: IOT_API_URL
        command: [sh, -c]
        args:
          - |
            echo "Calling $IOT_API_URL"
            curl -X POST "$IOT_API_URL" \
              -H "Content-Type: application/json" \
              -d '{"sessionId":"abc123"}'

    - name: call-emotion-api
      container:
        image: curlimages/curl:latest
        env:
          - name: EMOTION_API_URL
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: EMOTION_API_URL
        command: [sh, -c]
        args:
          - |
            echo "Calling $EMOTION_API_URL"
            curl -X POST "$EMOTION_API_URL" \
              -H "Content-Type: application/json" \
              -d '{"sessionId":"abc123"}'

    - name: call-question-api
      container:
        image: curlimages/curl:latest
        env:
          - name: QUESTION_API_URL
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: QUESTION_API_URL
        command: [sh, -c]
        args:
          - |
            echo "Calling $QUESTION_API_URL"
            curl -X POST "$QUESTION_API_URL" \
              -H "Content-Type: application/json" \
              -d '{"prompt":"추천 질문"}'

    - name: call-spellcheck-api
      container:
        image: curlimages/curl:latest
        env:
          - name: SPELLCHECK_API_URL
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: SPELLCHECK_API_URL
        command: [sh, -c]
        args:
          - |
            echo "Calling $SPELLCHECK_API_URL"
            curl -X POST "$SPELLCHECK_API_URL" \
              -H "Content-Type: application/json" \
              -d '{"text":"초안 자서전"}'

    - name: call-publish-api
      container:
        image: curlimages/curl:latest
        env:
          - name: PUBLISH_API_URL
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: PUBLISH_API_URL
        command: [sh, -c]
        args:
          - |
            echo "Calling $PUBLISH_API_URL"
            curl -X POST "$PUBLISH_API_URL" \
              -H "Content-Type: application/json" \
              -d '{"doc_id":"1234", "format":"pdf"}'
