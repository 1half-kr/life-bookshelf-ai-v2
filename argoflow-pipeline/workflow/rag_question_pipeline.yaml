apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: rag-question-pipeline
spec:
  entrypoint: main
  templates:
  - name: main
    dag:
      tasks:
        - name: user-embedding
          template: user-embedding

        - name: retrieve-similar
          dependencies: [user-embedding]
          template: retrieve-similar

        - name: generate-prompt
          dependencies: [retrieve-similar]
          template: generate-prompt

        - name: call-llm
          dependencies: [generate-prompt]
          template: call-llm

        - name: store-output
          dependencies: [call-llm]
          template: store-output

  # Include templates from separate files (for real-world, use kustomize or Argo CLI with --include)
  - name: user-embedding
    container:
      image: rag-pipeline:latest
      command: ["python", "scripts/user_embedding.py"]

  - name: retrieve-similar
    container:
      image: rag-pipeline:latest
      command: ["python", "scripts/retrieve_similar.py"]

  - name: generate-prompt
    container:
      image: rag-pipeline:latest
      command: ["python", "scripts/generate_prompt.py"]

  - name: call-llm
    container:
      image: rag-pipeline:latest
      command: ["python", "scripts/call_llm.py"]

  - name: store-output
    container:
      image: rag-pipeline:latest
      command: ["python", "scripts/store_result.py"]
