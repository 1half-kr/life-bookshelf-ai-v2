events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 설정
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # 기본 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # AI 서버용 추가 설정
    client_max_body_size 10M;  # 긴 대화 내용 허용
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Life Bookshelf AI upstreams
    upstream lifebookshelf_ai_v1 {
        server lifebookshelf-ai-v1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream lifebookshelf_ai_v2 {
        server lifebookshelf-ai-v2:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # 메인 서버 설정
    server {
        listen 80;
        server_name ai.lifebookshelf.org localhost;

        # Health check 엔드포인트 (nginx 자체)
        location /health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }

        # API v1 라우팅 (3000번 포트)
        location /api/v1/ {
            proxy_pass http://lifebookshelf_ai_v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;
        }
        
        # API v2 라우팅 (3001번 포트) - 스트리밍 지원
        location /api/v2/ {
            proxy_pass http://lifebookshelf_ai_v2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 스트리밍 설정
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;
            
            # 스트리밍 엔드포인트에만 추가 설정
            location ~ /conversation/chat/stream$ {
                add_header Cache-Control no-cache;
                add_header X-Accel-Buffering no;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
            }
        }
        
        # 기본 라우팅 (v2로 리다이렉트)
        location / {
            return 301 /api/v2$request_uri;
        }

        # API 문서 (Swagger UI)
        location ~ ^/api/(v1|v2)/docs {
            set $version $1;
            proxy_pass http://lifebookshelf_ai_$version/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # OpenAPI JSON
        location ~ ^/api/(v1|v2)/openapi.json {
            set $version $1;
            proxy_pass http://lifebookshelf_ai_$version/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 에러 페이지
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # 상태 모니터링 서버
    server {
        listen 8090;
        server_name localhost;

        # nginx 상태 정보
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # AI v1 서버 상태 확인
        location /ai_v1_status {
            access_log off;
            proxy_pass http://lifebookshelf_ai_v1/health;
            proxy_set_header Host $host;
        }
        
        # AI v2 서버 상태 확인
        location /ai_v2_status {
            access_log off;
            proxy_pass http://lifebookshelf_ai_v2/health;
            proxy_set_header Host $host;
        }

        # 전체 시스템 상태
        location /system_status {
            access_log off;
            return 200 "AI Server: OK\nNginx: OK\nTimestamp: $time_iso8601\n";
            add_header Content-Type text/plain;
        }
    }
}
