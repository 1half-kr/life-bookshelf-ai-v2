apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: conversation-processing-template
  namespace: life-bookshelf-ai
  labels:
    app: life-bookshelf-ai
    component: conversation-pipeline
spec:
  entrypoint: conversation-pipeline
  
  # Input parameters
  arguments:
    parameters:
    - name: session-id
      description: "Conversation session ID"
    - name: message
      description: "User message content"
    - name: user-context
      description: "User profile and context (JSON)"
    - name: message-type
      value: "text"
      description: "Message type (text/voice/image)"
    - name: pipeline-config
      value: "{}"
      description: "Pipeline configuration (JSON)"
  
  # Pipeline templates
  templates:
  
  # Main pipeline DAG
  - name: conversation-pipeline
    dag:
      tasks:
      
      # Step 1: Input Validation
      - name: validate-input
        template: validation-step
        arguments:
          parameters:
          - name: session-id
            value: "{{workflow.parameters.session-id}}"
          - name: message
            value: "{{workflow.parameters.message}}"
          - name: user-context
            value: "{{workflow.parameters.user-context}}"
          - name: message-type
            value: "{{workflow.parameters.message-type}}"
      
      # Step 2: Load Context
      - name: load-context
        template: context-loader-step
        dependencies: [validate-input]
        arguments:
          parameters:
          - name: session-id
            value: "{{tasks.validate-input.outputs.parameters.validated-session-id}}"
          - name: user-profile
            value: "{{tasks.validate-input.outputs.parameters.validated-user-profile}}"
      
      # Step 3: Process with LLM
      - name: process-llm
        template: llm-processor-step
        dependencies: [load-context]
        arguments:
          parameters:
          - name: message
            value: "{{tasks.validate-input.outputs.parameters.validated-message}}"
          - name: user-profile
            value: "{{tasks.validate-input.outputs.parameters.validated-user-profile}}"
          - name: conversation-context
            value: "{{tasks.load-context.outputs.parameters.conversation-context}}"
          - name: generation-context
            value: "{{tasks.load-context.outputs.parameters.generation-context}}"
          - name: historical-context
            value: "{{tasks.load-context.outputs.parameters.historical-context}}"
      
      # Step 4: Build Response
      - name: build-response
        template: response-builder-step
        dependencies: [process-llm]
        arguments:
          parameters:
          - name: ai-response
            value: "{{tasks.process-llm.outputs.parameters.ai-response}}"
          - name: follow-up-questions
            value: "{{tasks.process-llm.outputs.parameters.follow-up-questions}}"
          - name: session-data
            value: "{{tasks.load-context.outputs.parameters.session-data}}"
  
  # Individual step templates
  
  # Validation Step
  - name: validation-step
    inputs:
      parameters:
      - name: session-id
      - name: message
      - name: user-context
      - name: message-type
    outputs:
      parameters:
      - name: validated-session-id
        valueFrom:
          path: /tmp/validated-session-id
      - name: validated-message
        valueFrom:
          path: /tmp/validated-message
      - name: validated-user-profile
        valueFrom:
          path: /tmp/validated-user-profile
    container:
      image: life-bookshelf-ai/pipeline-runner:latest
      command: [python]
      args: 
      - -c
      - |
        import sys
        sys.path.append('/app')
        from pipelines.conversation.steps.validation import InputValidationStep
        from shared.models.pipeline import StepContext
        import json
        
        # Create step context
        context = StepContext(
          pipeline_id="{{workflow.name}}",
          step_name="validation",
          input_data={
            "session_id": "{{inputs.parameters.session-id}}",
            "message": "{{inputs.parameters.message}}",
            "user_context": json.loads('{{inputs.parameters.user-context}}'),
            "message_type": "{{inputs.parameters.message-type}}"
          }
        )
        
        # Execute validation step
        step = InputValidationStep()
        result = await step.execute(context)
        
        if result.is_successful:
          # Write outputs
          with open('/tmp/validated-session-id', 'w') as f:
            f.write(result.output_data['validated_session_id'])
          with open('/tmp/validated-message', 'w') as f:
            f.write(result.output_data['validated_message'])
          with open('/tmp/validated-user-profile', 'w') as f:
            f.write(json.dumps(result.output_data['validated_user_profile'].__dict__))
        else:
          print(f"Validation failed: {result.error_message}")
          sys.exit(1)
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
  
  # Context Loader Step
  - name: context-loader-step
    inputs:
      parameters:
      - name: session-id
      - name: user-profile
    outputs:
      parameters:
      - name: conversation-context
        valueFrom:
          path: /tmp/conversation-context
      - name: generation-context
        valueFrom:
          path: /tmp/generation-context
      - name: historical-context
        valueFrom:
          path: /tmp/historical-context
      - name: session-data
        valueFrom:
          path: /tmp/session-data
    container:
      image: life-bookshelf-ai/pipeline-runner:latest
      command: [python]
      args:
      - -c
      - |
        import sys
        sys.path.append('/app')
        from pipelines.conversation.steps.context_loader import ContextLoaderStep
        from shared.models.pipeline import StepContext
        from shared.models.data import UserProfile
        import json
        
        # Parse user profile
        user_profile_data = json.loads('{{inputs.parameters.user-profile}}')
        user_profile = UserProfile(**user_profile_data)
        
        # Create step context
        context = StepContext(
          pipeline_id="{{workflow.name}}",
          step_name="context_loader",
          input_data={
            "validated_session_id": "{{inputs.parameters.session-id}}",
            "validated_user_profile": user_profile
          }
        )
        
        # Execute context loading step
        step = ContextLoaderStep()
        result = await step.execute(context)
        
        if result.is_successful:
          # Write outputs
          with open('/tmp/conversation-context', 'w') as f:
            f.write(json.dumps(result.output_data['conversation_context']))
          with open('/tmp/generation-context', 'w') as f:
            f.write(json.dumps(result.output_data['generation_context']))
          with open('/tmp/historical-context', 'w') as f:
            f.write(json.dumps(result.output_data['historical_context']))
          with open('/tmp/session-data', 'w') as f:
            f.write(json.dumps(result.output_data['conversation_session'].__dict__))
        else:
          print(f"Context loading failed: {result.error_message}")
          sys.exit(1)
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "500m"
  
  # LLM Processor Step
  - name: llm-processor-step
    inputs:
      parameters:
      - name: message
      - name: user-profile
      - name: conversation-context
      - name: generation-context
      - name: historical-context
    outputs:
      parameters:
      - name: ai-response
        valueFrom:
          path: /tmp/ai-response
      - name: follow-up-questions
        valueFrom:
          path: /tmp/follow-up-questions
    container:
      image: life-bookshelf-ai/pipeline-runner:latest
      command: [python]
      args:
      - -c
      - |
        import sys
        sys.path.append('/app')
        from pipelines.conversation.steps.llm_processor import LLMProcessorStep
        from shared.models.pipeline import StepContext
        import json
        
        # Create step context
        context = StepContext(
          pipeline_id="{{workflow.name}}",
          step_name="llm_processor",
          input_data={
            "validated_message": "{{inputs.parameters.message}}",
            "validated_user_profile": json.loads('{{inputs.parameters.user-profile}}'),
            "conversation_context": json.loads('{{inputs.parameters.conversation-context}}'),
            "generation_context": json.loads('{{inputs.parameters.generation-context}}'),
            "historical_context": json.loads('{{inputs.parameters.historical-context}}'),
            "is_new_session": True  # This should come from context loader
          }
        )
        
        # Execute LLM processing step
        step = LLMProcessorStep()
        result = await step.execute(context)
        
        if result.is_successful:
          # Write outputs
          with open('/tmp/ai-response', 'w') as f:
            f.write(result.output_data['ai_response'])
          with open('/tmp/follow-up-questions', 'w') as f:
            f.write(json.dumps(result.output_data['follow_up_questions']))
        else:
          print(f"LLM processing failed: {result.error_message}")
          sys.exit(1)
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
          nvidia.com/gpu: 1
        limits:
          memory: "2Gi"
          cpu: "1000m"
          nvidia.com/gpu: 1
  
  # Response Builder Step
  - name: response-builder-step
    inputs:
      parameters:
      - name: ai-response
      - name: follow-up-questions
      - name: session-data
    outputs:
      parameters:
      - name: final-response
        valueFrom:
          path: /tmp/final-response
    container:
      image: life-bookshelf-ai/pipeline-runner:latest
      command: [python]
      args:
      - -c
      - |
        import sys
        sys.path.append('/app')
        from pipelines.conversation.steps.response_builder import ResponseBuilderStep
        from shared.models.pipeline import StepContext
        import json
        
        # Create step context
        context = StepContext(
          pipeline_id="{{workflow.name}}",
          step_name="response_builder",
          input_data={
            "ai_response": "{{inputs.parameters.ai-response}}",
            "follow_up_questions": json.loads('{{inputs.parameters.follow-up-questions}}'),
            "conversation_session": json.loads('{{inputs.parameters.session-data}}')
          }
        )
        
        # Execute response building step
        step = ResponseBuilderStep()
        result = await step.execute(context)
        
        if result.is_successful:
          # Write final response
          with open('/tmp/final-response', 'w') as f:
            f.write(json.dumps(result.output_data['final_response']))
        else:
          print(f"Response building failed: {result.error_message}")
          sys.exit(1)
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"

---
# Service Account for Workflow execution
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conversation-pipeline-sa
  namespace: life-bookshelf-ai

---
# Role for pipeline execution
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: conversation-pipeline-role
  namespace: life-bookshelf-ai
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["workflows", "workflowtemplates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Role binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: conversation-pipeline-binding
  namespace: life-bookshelf-ai
subjects:
- kind: ServiceAccount
  name: conversation-pipeline-sa
  namespace: life-bookshelf-ai
roleRef:
  kind: Role
  name: conversation-pipeline-role
  apiGroup: rbac.authorization.k8s.io
